# config verified: all required top-level keys present
backtest:
  days: 90
  initial_capital: 10000.0
  bollinger_multiplier: 2.0
  rotation_margin: 0.05
  min_entry_score: 0.25
  rebalance_cooldown_hours: 4.0
  max_rebalances_per_pool_per_day: 3
  prices_dir: data/prices
  hourly_dir: data/historical
  max_il_pct: "-0.05"
  min_tvl_usd: "500000"
  min_volume_usd: "50000"
  max_hold_hours: 720

signals:
  drawdown_pct: 0.15
  momentum_crash_pct_per_hr: 0.03
  momentum_crash_lookback_hrs: 3
  tvl_collapse_rate: -0.30
  il_fee_ratio_threshold: 8.0
  il_fee_min_hold_hours: 24.0

scoring:
  weights:
    net_lp_alpha_30d: 0.50
    annualized_vol_30d: -0.20
    fee_apr: 0.20
    volume_tvl_ratio: -0.10
  hard_gate_net_lp_alpha: true

risk_tiers:
  anchor:
    max_vol: 0.40
    min_fee_apr: 0.08
    max_allocation: 0.60
  satellite:
    max_vol: 0.80
    min_fee_apr: 0.15
    max_allocation: 0.30
  speculative:
    min_fee_apr: 0.25
    max_allocation: 0.10

harvesting:
  interval_hours: 6
  min_fee_gas_ratio: 3.0

data_sources:
  the_graph:
    # Aerodrome Base Full — decentralized gateway (Studio endpoint is dead as of Sprint 8)
    # Subgraph ID: GENunSHWLBXm59mBSgPzQ8metBEp9YDfdqwFr91Av1UM
    # Auth: API key embedded in URL path (gateway standard) + Bearer header sent redundantly
    url: "https://gateway.thegraph.com/api/{api_key}/subgraphs/id/GENunSHWLBXm59mBSgPzQ8metBEp9YDfdqwFr91Av1UM"
    api_key: ""          # set via THEGRAPH_API_KEY env var at runtime
    rate_limit_per_min: 30

  coingecko:
    api_key: ""          # set via COINGECKO_API_KEY env var at runtime
    rate_limit_per_min: 30

  defillama:
    protocol_slug: "aerodrome-finance"
    rate_limit_per_min: 100

  gecko_terminal:
    network: "base"
    timeframe: "hour"
    rate_limit_per_min: 25

rpc:
  base_http: ""    # set via BASE_RPC_HTTP env var at runtime
  base_ws: ""      # set via BASE_RPC_WS env var at runtime

